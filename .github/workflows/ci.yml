name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Build
        run: node esbuild.js --production

      - name: Test
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npm run vsix

      - uses: actions/upload-artifact@v4
        with:
          name: cliuno-vsix
          path: "*.vsix"
